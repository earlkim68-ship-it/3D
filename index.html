<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Scene</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 class="text-2xl font-bold opacity-90">Three.js 3D Viewport</h1>
        <p class="text-sm opacity-70">Interactive Geometry Exploration</p>
    </div>

    <div class="instruction">
        마우스를 드래그하여 화면을 회전시키세요
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, objects = [];
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotation = { x: 0.2, y: 0.5 };

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);
            scene.fog = new THREE.Fog(0x0a0a12, 10, 50);

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 4. Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0x00ffff, 1);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xff00ff, 1);
            pointLight2.position.set(-10, -10, 10);
            scene.add(pointLight2);

            // 5. Objects Creation (Random Shapes)
            const geometries = [
                new THREE.IcosahedronGeometry(1, 0),
                new THREE.TorusGeometry(0.7, 0.2, 16, 100),
                new THREE.OctahedronGeometry(1, 0),
                new THREE.BoxGeometry(1, 1, 1)
            ];

            for (let i = 0; i < 50; i++) {
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
                    metalness: 0.7,
                    roughness: 0.2,
                    wireframe: Math.random() > 0.8
                });

                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const mesh = new THREE.Mesh(geo, material);

                mesh.position.set(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40
                );

                mesh.rotation.set(Math.random() * 2, Math.random() * 2, Math.random() * 2);
                
                // 애니메이션 속성 저장
                mesh.userData = {
                    rotSpeedX: (Math.random() - 0.5) * 0.02,
                    rotSpeedY: (Math.random() - 0.5) * 0.02,
                    floatSpeed: (Math.random() - 0.5) * 0.01,
                    originalY: mesh.position.y
                };

                scene.add(mesh);
                objects.push(mesh);
            }

            // Central Sun-like object
            const coreGeo = new THREE.SphereGeometry(3, 32, 32);
            const coreMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                emissive: 0xffffff, 
                emissiveIntensity: 0.5,
                wireframe: true 
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);
            objects.push(core);

            // 6. Interaction Events
            window.addEventListener('mousedown', (e) => { isDragging = true; });
            window.addEventListener('mouseup', (e) => { isDragging = false; });
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('resize', onWindowResize);
            
            // Mobile support
            window.addEventListener('touchstart', (e) => { isDragging = true; });
            window.addEventListener('touchend', (e) => { isDragging = false; });
            window.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    handleMouseMove({
                        clientX: e.touches[0].clientX,
                        clientY: e.touches[0].clientY
                    });
                }
            });
        }

        function handleMouseMove(e) {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                targetRotation.y += deltaX * 0.005;
                targetRotation.x += deltaY * 0.005;
            }
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // 카메라 시점 부드럽게 보간 (Lerp)
            camera.position.x += (Math.sin(targetRotation.y) * 25 - camera.position.x) * 0.05;
            camera.position.y += (Math.sin(targetRotation.x) * 25 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            // 오브젝트 애니메이션
            objects.forEach((obj, index) => {
                if (obj.userData.rotSpeedX) {
                    obj.rotation.x += obj.userData.rotSpeedX;
                    obj.rotation.y += obj.userData.rotSpeedY;
                    obj.position.y = obj.userData.originalY + Math.sin(time + index) * 2;
                } else {
                    // Core object
                    obj.rotation.y += 0.005;
                }
            });

            renderer.render(scene, camera);
        }

        window.onload = function() {
            init();
            animate();
        };
    </script>
</body>
</html>
